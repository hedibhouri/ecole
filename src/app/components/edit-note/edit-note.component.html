<section class="page-header">
    <div class="page-header-content">
        <h2>Add Course</h2>
    </div>
</section>
<!-- Student Form Section -->
<section class="form-section" id="student-form">
    <div class="container">
        <form id="studentForm" class="student-form" [formGroup]="editNoteForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="note">Note</label>
                    <input type="text" id="note" formControlName="note" name="note" required>
                    <div class="text-danger"
                        *ngIf="editNoteForm.controls['note'].invalid && (editNoteForm.controls['note'].touched || editNoteForm.controls['note'].dirty)">
                        <div *ngIf="editNoteForm.controls['note'].errors?.['min']">note must be at least 0</div>
                        <div *ngIf="editNoteForm.controls['note'].errors?.['max']">note must be at most 20</div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="evaluation">Evaluation</label>
                    <input type="text" formControlName="evaluation" id="evaluation" name="evaluation">
                </div>
            </div>
            <div class="form-actions">
                <button style="margin: 0 auto" type="submit" (click)="editNote()" class="btn btn-primary">Edit</button>
            </div>
        </form>
    </div>
</section>
